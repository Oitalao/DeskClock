<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Desk Smart Clock</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
    <div id="burn-in-protector">
        <div id="carousel">
            
            <div class="screen" id="screen-clock">
                <div class="clock-time" id="time">00:00</div>
                <div class="clock-date" id="date">Carregando data...</div>
            </div>

            <div class="screen" id="screen-weather">
                <h2>Clima Atual</h2>
                <div class="weather-info">
                    <span id="temp">--°C</span>
                    <p>Chuva: <span id="rain">--%</span> | Umidade: <span id="humidity">--%</span></p>
                </div>
            </div>

            <div class="screen" id="screen-calendar">
                <h2>Google Calendário</h2>
                <button id="auth-btn" onclick="handleAuthClick()">Conectar Google</button>
                <div id="events-list"></div>
                
                <div id="add-event-form" style="display: none;">
                    <input type="text" id="event-title" placeholder="Nome do evento" class="aesthetic-input">
                    <button onclick="addEvent()" class="aesthetic-btn">+</button>
                </div>
            </div>

        </div>
        
        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
